<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Zone d'intervention</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      font-size: 24px;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .texte {
      font-size: 18px;
      color: #333;
      margin-top: 20px;
    }

    .accueil {
      display: inline-block;
      margin-top: 25px;
      padding: 10px 20px;
      background: #2c3e50;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s;
    }

    .accueil:hover {
      background: #1a242f;
    }

  </style>
</head>

<body>

  <header>
    Zone d’intervention
  </header>

  <div class="container">

    <p class="texte">
      Je me déplace sur <strong>Les Andelys</strong> dans un rayon d’environ
      <strong>30 km aux alentours</strong>.
    </p>

    <a class="accueil" href="index.html">
      Retour à l’accueil
    </a>

  </div>

</body>
</html>
