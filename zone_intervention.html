<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Zone d’intervention</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
      font-size: 24px;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .ville {
      font-size: 26px;
      font-weight: bold;
      color: #000; /* noir = impossible à cacher */
      background: #fff3e0;
      padding: 15px;
      border: 2px solid #e67e22;
      border-radius: 8px;
      display: inline-block;
      margin-top: 15px;
    }

    .zone {
      margin-top: 20px;
      font-size: 18px;
      color: #333;
    }

    footer {
      margin-top: 40px;
      padding: 15px;
      background: #2c3e50;
      color: white;
    }
  </style>
</head>

<body>

  <header>
    Zone d’intervention
  </header>

  <div class="container">

    <div class="ville">
      Les Andelys
    </div>

    <div class="zone">
      Je me déplace sur Les Andelys et dans un rayon d’environ <strong>30 km</strong> aux alentours.
    </div>
